apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: demo-ingress

spec:
  rules:
  - host: https://val-cloud.vercel.app/
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demo-service
            port:
              number: 80